const GAME_TIME=60,TSUM_COUNT=50,GRAVITY=0.14,BOUNCE=0.08,FRICTION=0.96,DAMPING=0.8;

function Game(){
  const canvasRef=useRef(null);
  const gs=useRef(null);
  const raf=useRef(null);
  const imgReady=useRef(false);
  const imgMap=useRef({});
  const spriteCache=useRef({});

  const loadImgs=useCallback(()=>{
    let n=0;const total=CHARS.length+3;
    CHARS.forEach(c=>{
      const im=new Image();
      im.onload=()=>{imgMap.current[c.id]=im;n++;if(n===total){imgReady.current=true;buildSprites();}};
      im.src=c.img;
    });
    const nhdm=new Image();
    nhdm.onload=()=>{imgMap.current["nhdm"]=nhdm;n++;if(n===total){imgReady.current=true;buildSprites();}};
    nhdm.src=NHDM_IMG;
    const shark=new Image();

    shark.src=SHARK_IMG;
    const bgImg=new Image();
    bgImg.onload=()=>{imgMap.current["bg"]=bgImg;n++;if(n===total){imgReady.current=true;buildSprites();}};
    bgImg.src=BG_IMG;
  },[]);

  const buildSprites=()=>{
    const sizes=[40,56,64,80,100,120,160];
    CHARS.forEach(ch=>{
      spriteCache.current[ch.id]={};
      sizes.forEach(sz=>{
        const oc=document.createElement('canvas');
        oc.width=sz*2;oc.height=sz*2;
        const ox=oc.getContext('2d');
        const R=sz;
        ox.translate(R,R);
        const base=ox.createRadialGradient(-R*0.2,-R*0.25,R*0.08,R*0.08,R*0.08,R*1.05);
        base.addColorStop(0,"rgba(255,255,255,0.18)");base.addColorStop(0.35,ch.color+"50");base.addColorStop(1,ch.dark+"90");
        ox.fillStyle=base;ox.beginPath();ox.arc(0,0,R,0,Math.PI*2);ox.fill();
        ox.save();ox.beginPath();ox.arc(0,0,R*0.9,0,Math.PI*2);ox.clip();
        const img=imgMap.current[ch.id];if(img)ox.drawImage(img,-R,-R,R*2,R*2);
        ox.restore();
        const hl=ox.createRadialGradient(-R*0.3,-R*0.3,0,0,0,R*0.85);
        hl.addColorStop(0,"rgba(255,255,255,0.3)");hl.addColorStop(0.35,"rgba(255,255,255,0.05)");hl.addColorStop(1,"transparent");
        ox.fillStyle=hl;ox.beginPath();ox.arc(0,0,R,0,Math.PI*2);ox.fill();
        ox.strokeStyle="rgba(255,255,255,0.15)";ox.lineWidth=1.5;ox.beginPath();ox.arc(0,0,R,0,Math.PI*2);ox.stroke();
        spriteCache.current[ch.id][sz]=oc;
      });
    });
  };

  const mkTsum=(cx,cy,type,R)=>({id:tsumId++,type,x:cx,y:cy,vx:(Math.random()-0.5)*0.5,vy:-0.3-Math.random()*0.8,r:R,alive:true,sleep:0});

  // BOMB object
  const mkBomb=(cx,cy,R)=>({id:tsumId++,type:-1,x:cx,y:cy,vx:(Math.random()-0.5)*0.5,vy:-1,r:R*1.1,alive:true,sleep:0,isBomb:true,glow:0});

  const initState=(W,H)=>{
    const R=Math.min(W,480)*0.072;
    const boxL=10,boxR=Math.min(W,480)-10,boxT=H*0.13,boxB=H*0.76;
    const tsums=[];

  useEffect(()=>{

    const findTsum=(px,py)=>{const s=gs.current;if(!s)return null;let best=null,bestD=Infinity;const ts=s.tsums;for(let i=0;i<ts.length;i++){const t=ts[i];if(!t.alive)continue;const dx=t.x-px,dy=t.y-py,d=dx*dx+dy*dy;const r2=t.r*1.4;if(d<r2*r2&&d<bestD){best=t;bestD=d;}}return best;};

      const t=findTsum(pos.x,pos.y);if(!t)return;

  const update=()=>{

        if(t.x+t.r>s.boxR){t.x=s.boxR-t.r;t.vx=-Math.abs(t.vx)*BOUNCE;}
        if(t.y+t.r>s.boxB){t.y=s.boxB-t.r;t.vy=-Math.abs(t.vy)*BOUNCE;t.vx*=DAMPING;}
        if(t.y-t.r<s.boxT-150){t.y=s.boxT-150+t.r;t.vy=Math.abs(t.vy)*BOUNCE;}
      }
      for(let i=0;i<len;i++){
        const a=ts[i];if(!a.alive||a.sleep>15)continue;
        for(let j=i+1;j<len;j++){
          const b=ts[j];if(!b.alive)continue;
          const dx=b.x-a.x,dy=b.y-a.y,distSq=dx*dx+dy*dy,minD=a.r+b.r;
          if(distSq<minD*minD&&distSq>0.01){
            const dist=Math.sqrt(distSq),nx=dx/dist,ny=dy/dist,overlap=(minD-dist)*0.3;

            a.sleep=0;b.sleep=0;
          }
        }
      }
    }

    s.tsums.forEach(t=>{if(t.isBomb&&t.alive){t.glow=(t.glow||0)+0.08;}});

    if(s.cut){
      const c=s.cut;c.timer++;const p=c.timer/c.max;
      const ch=CHARS[c.id];

      // Gauge bar
      const gaugeY=btnY+btnH-5,gaugeH=3;
      ctx.fillStyle="rgba(255,255,255,0.06)";ctx.fillRect(bx+3,gaugeY,btnW-6,gaugeH);
      if(fill>0){
        const gg=ctx.createLinearGradient(bx+3,gaugeY,bx+3+(btnW-6)*Math.min(fill,1),gaugeY);
        gg.addColorStop(0,ch.color);gg.addColorStop(1,ch.glow);
        ctx.fillStyle=gg;ctx.fillRect(bx+3,gaugeY,Math.max(0,(btnW-6)*Math.min(fill,1)),gaugeH);
      }
      // Icon
      if(imgReady.current){const sp=getSprite(i,10);if(sp)ctx.drawImage(sp,bx+4,btnY+4,20,20);}
      // Text
      ctx.textAlign="left";ctx.fillStyle=ready?"#fff":"rgba(255,255,255,0.3)";
      ctx.font="bold 7px 'Segoe UI',sans-serif";ctx.fillText(ch.skillName,bx+26,btnY+14);
      ctx.fillStyle="rgba(255,255,255,0.2)";ctx.font="7px 'Segoe UI',sans-serif";
      ctx.fillText(Math.floor(s.skillGauge[i])+"/"+ch.skillCost,bx+26,btnY+25);
      if(ready){
        ctx.fillStyle=ch.glow;ctx.font="bold 9px 'Segoe UI',sans-serif";
        ctx.globalAlpha=0.7+0.3*Math.sin(t*6+i);
        ctx.fillText("READY!",bx+26,btnY+37);ctx.globalAlpha=1;
      }
    });
  };

  const drawResult=(ctx,W,H,t,s)=>{
    // Cinematic dark overlay
    ctx.fillStyle="rgba(2,0,12,0.92)";ctx.fillRect(0,0,W,H);
    // Animated color orbs behind panel
    for(let i=0;i<4;i++){
      ctx.globalAlpha=0.05+0.03*Math.sin(t*1.2+i*1.5);
      const hue=(t*25+i*90)%360;
      ctx.fillStyle=`hsl(${hue},70%,45%)`;
      ctx.beginPath();ctx.arc(W*(0.15+i*0.23),H*(0.25+0.12*Math.sin(t*0.7+i)),70+20*Math.sin(t*0.6+i),0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;

    const pW=W*0.92,pH2=H*0.84,px=(W-pW)/2,py=H*0.04;

    // Panel with gradient border
    roundRect(ctx,px-1,py-1,pW+2,pH2+2,20);
    const borderG=ctx.createLinearGradient(px,py,px+pW,py+pH2);
    borderG.addColorStop(0,"#FFD700");borderG.addColorStop(0.3,"#DA70D6");borderG.addColorStop(0.6,"#00BFFF");borderG.addColorStop(1,"#FFD700");
    ctx.strokeStyle=borderG;ctx.lineWidth=2;ctx.stroke();
    roundRect(ctx,px,py,pW,pH2,20);
    const panelBg=ctx.createLinearGradient(px,py,px,py+pH2);
    panelBg.addColorStop(0,"rgba(15,8,45,0.97)");panelBg.addColorStop(1,"rgba(8,4,25,0.97)");
    ctx.fillStyle=panelBg;ctx.fill();

    // Decorative top line
    const topLineG=ctx.createLinearGradient(px+30,py+8,px+pW-30,py+8);
    topLineG.addColorStop(0,"transparent");topLineG.addColorStop(0.3,"#FFD70060");topLineG.addColorStop(0.5,"#FFD700");topLineG.addColorStop(0.7,"#FFD70060");topLineG.addColorStop(1,"transparent");
    ctx.strokeStyle=topLineG;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(px+30,py+12);ctx.lineTo(px+pW-30,py+12);ctx.stroke();

    // Header
    ctx.textAlign="center";ctx.fillStyle="#9B8EC4";ctx.font="bold 11px 'Segoe UI',sans-serif";
    ctx.fillText("mirco_tsum",W/2,py+22);
    ctx.fillStyle="rgba(255,255,255,0.25)";ctx.font="7px monospace";
    ctx.fillText("CA: HGNjaczVcV6tKbpWCLarszbwtwB9hUd2Cd7ySbabpump",W/2,py+34);

    // Big score with glow effect
    const scoreStr=s.score.toLocaleString();
    ctx.font="bold 52px 'Trebuchet MS',sans-serif";
    // Glow layers
    ctx.globalAlpha=0.15;ctx.fillStyle="#FFD700";ctx.fillText(scoreStr,W/2+2,py+82);
    ctx.globalAlpha=0.3;ctx.fillText(scoreStr,W/2+1,py+81);
    ctx.globalAlpha=1;
    const scoreG=ctx.createLinearGradient(W/2-80,py+50,W/2+80,py+85);
    scoreG.addColorStop(0,"#FFE066");scoreG.addColorStop(0.5,"#FFD700");scoreG.addColorStop(1,"#FFA500");
    ctx.fillStyle=scoreG;ctx.fillText(scoreStr,W/2,py+80);

    // Title system
    const td=getTitleData(s.score);

    // Title display
    const titleY=py+110;
    roundRect(ctx,px+16,titleY-18,pW-32,48,10);
    ctx.fillStyle="rgba(255,255,255,0.03)";ctx.fill();
    ctx.strokeStyle=td.rc+"30";ctx.lineWidth=1;roundRect(ctx,px+16,titleY-18,pW-32,48,10);ctx.stroke();
    // Rank badge
    ctx.fillStyle=td.rc+"20";ctx.beginPath();ctx.arc(px+42,titleY+6,18,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=td.rc;ctx.lineWidth=1.5;ctx.globalAlpha=0.6+0.4*Math.sin(t*4);
    ctx.beginPath();ctx.arc(px+42,titleY+6,18,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
    ctx.fillStyle=td.rc;ctx.font="bold 16px 'Trebuchet MS',sans-serif";ctx.textAlign="center";
    ctx.fillText(td.rank,px+42,titleY+12);
    // Title text
    ctx.textAlign="left";
    ctx.fillStyle=td.rc;ctx.font="bold 16px 'Trebuchet MS',sans-serif";
    ctx.fillText(td.icon+" "+td.title,px+68,titleY+4);
    ctx.fillStyle="#888";ctx.font="12px 'Segoe UI',sans-serif";
    ctx.fillText(td.sub,px+68,titleY+22);

    // Divider
    const divY=py+158;
    const divG=ctx.createLinearGradient(px+20,divY,px+pW-20,divY);
    divG.addColorStop(0,"transparent");divG.addColorStop(0.5,"rgba(140,120,255,0.3)");divG.addColorStop(1,"transparent");
    ctx.strokeStyle=divG;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(px+20,divY);ctx.lineTo(px+pW-20,divY);ctx.stroke();

    // Stats rows
    const rowY=divY+18,rowH=20;
    const drawRow2=(icon,label,val,y,col)=>{
      ctx.textAlign="left";ctx.fillStyle="#666";ctx.font="10px 'Segoe UI',sans-serif";
      ctx.fillText(icon+"  "+label,px+20,y);
      ctx.textAlign="right";ctx.fillStyle=col||"#ddd";ctx.font="bold 12px 'Trebuchet MS',sans-serif";ctx.fillText(val,px+pW-20,y);
    };
    drawRow2("\u26a1","Level Bonus (8%)","+"+Math.floor(s.score*0.08).toLocaleString(),rowY,"#81C784");
    drawRow2("\ud83d\udd25","Max Combo","x"+s.maxCombo,rowY+rowH,"#FF69B4");
    drawRow2("\u2b50","Token Earned",Math.floor(s.score*0.1).toLocaleString(),rowY+rowH*2,"#FFD54F");
    drawRow2("\ud83e\ude99","Coin Earned",Math.floor(s.totalPop*5).toLocaleString(),rowY+rowH*2+rowH,"#DAA520");

    // Character pop section
    const charY=rowY+rowH*4+12;
    const charDivG=ctx.createLinearGradient(px+20,charY-6,px+pW-20,charY-6);
    charDivG.addColorStop(0,"transparent");charDivG.addColorStop(0.5,"rgba(140,120,255,0.25)");charDivG.addColorStop(1,"transparent");
    ctx.strokeStyle=charDivG;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(px+20,charY-6);ctx.lineTo(px+pW-20,charY-6);ctx.stroke();

    ctx.textAlign="center";ctx.fillStyle="#9B8EC4";ctx.font="bold 10px 'Segoe UI',sans-serif";
    ctx.fillText("\u6d88\u53bb\u6570",W/2,charY+6);

    // Character icons with pop counts in a row
    const charRowY=charY+30;
    const charSpacing=pW/CHARS.length;
    CHARS.forEach((ch,i)=>{
      const cx=px+charSpacing/2+i*charSpacing;
      const iconSz=36;

      // Bg circle
      ctx.fillStyle=ch.color+"18";ctx.beginPath();ctx.arc(cx,charRowY,iconSz/2+6,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=ch.color+"40";ctx.lineWidth=1;ctx.beginPath();ctx.arc(cx,charRowY,iconSz/2+6,0,Math.PI*2);ctx.stroke();

      // Character sprite
      if(imgReady.current){const sp=getSprite(ch.id,iconSz/2);if(sp)ctx.drawImage(sp,cx-iconSz/2,charRowY-iconSz/2,iconSz,iconSz);}

      // Pop count
      ctx.textAlign="center";ctx.fillStyle="#fff";ctx.font="bold 16px 'Trebuchet MS',sans-serif";
      ctx.fillText(String(s.charPops[i]),cx,charRowY+iconSz/2+16);

      // Name
      ctx.fillStyle="#888";ctx.font="8px 'Segoe UI',sans-serif";
      ctx.fillText(ch.name,cx,charRowY+iconSz/2+28);
    });

    // Bottom buttons
    const btnRow=py+pH2-100;

    // X Account display (already entered via auto-prompt)
    const nameY=btnRow-46;
    roundRect(ctx,px+12,nameY,pW-24,34,8);ctx.fillStyle="rgba(29,161,242,0.06)";ctx.fill();
    ctx.strokeStyle="rgba(29,161,242,0.15)";ctx.lineWidth=1;roundRect(ctx,px+12,nameY,pW-24,34,8);ctx.stroke();
    ctx.textAlign="left";ctx.fillStyle="#1DA1F2";ctx.font="bold 10px 'Segoe UI',sans-serif";ctx.fillText("\ud835\udd4f Account",px+20,nameY+14);
    ctx.fillStyle=s.xName?"#fff":"#555";ctx.font="bold 13px 'Segoe UI',sans-serif";
    const dispName=s.xName?(s.xName.startsWith("@")?"":"@")+s.xName:"Tap to set name";
    ctx.fillText(dispName,px+20,nameY+28);
    // Tap to change
    ctx.textAlign="right";ctx.fillStyle="#666";ctx.font="9px 'Segoe UI',sans-serif";
    ctx.fillText(s.xName?"\u270e Edit":"",px+pW-20,nameY+28);
    s._nameBtn={x:px+12,y:nameY,w:pW-24,h:34};

    // Share to X button (screenshot)
    roundRect(ctx,px+12,btnRow,pW/2-22,38,12);
    const xBtnG=ctx.createLinearGradient(px+12,btnRow,px+pW/2-10,btnRow+38);
    xBtnG.addColorStop(0,"#1a1a2e");xBtnG.addColorStop(1,"#16213e");
    ctx.fillStyle=xBtnG;ctx.fill();
    ctx.strokeStyle="#1DA1F240";ctx.lineWidth=1;roundRect(ctx,px+12,btnRow,pW/2-22,38,12);ctx.stroke();
    ctx.fillStyle="#1DA1F2";ctx.font="bold 11px 'Segoe UI',sans-serif";ctx.textAlign="center";
    ctx.fillText("\ud83d\udcf8\u30b9\u30af\u30b7\u30e7\u3057\u3066\ud835\udd4f\u306b\u6295\u7a3f",px+12+(pW/2-22)/2,btnRow+25);

    // Retry button
    roundRect(ctx,px+pW/2+8,btnRow,pW/2-22,38,12);
    const retryG=ctx.createLinearGradient(px+pW/2+8,btnRow,px+pW-14,btnRow+38);
    retryG.addColorStop(0,"#FF6B35");retryG.addColorStop(1,"#F7931E");
    ctx.fillStyle=retryG;ctx.fill();
    ctx.fillStyle="#fff";ctx.font="bold 14px 'Segoe UI',sans-serif";
    ctx.fillText("\u30ea\u30c8\u30e9\u30a4",px+pW/2+8+(pW/2-22)/2,btnRow+25);

    // HOME button (full width below)
    const homeY=btnRow+46;
    roundRect(ctx,px+12,homeY,pW-24,38,12);
    ctx.fillStyle="rgba(255,255,255,0.04)";ctx.fill();
    ctx.strokeStyle="rgba(150,120,255,0.2)";ctx.lineWidth=1;roundRect(ctx,px+12,homeY,pW-24,38,12);ctx.stroke();
    ctx.fillStyle="#B8A9D4";ctx.font="bold 14px 'Segoe UI',sans-serif";ctx.textAlign="center";
    ctx.fillText("\u2302  \u30db\u30fc\u30e0\u306b\u623b\u308b",W/2,homeY+25);

    s._shareBtn={x:px+12,y:btnRow,w:pW/2-22,h:38};
    s._retryBtn={x:px+pW/2+8,y:btnRow,w:pW/2-22,h:38};
    s._homeBtn={x:px+12,y:homeY,w:pW-24,h:38};
  };

  const drawCut=(ctx,W,H,t,s)=>{
    const c=s.cut,ch=CHARS[c.id];
    const p=c.timer/c.max;
    const cx=W/2,cy=H*0.4;

    // Screen shake offset
    const shk=s.cutShake||0;
    const sx2=shk>0?(Math.random()-0.5)*shk:0;
    const sy2=shk>0?(Math.random()-0.5)*shk:0;
    ctx.save();
    if(shk>0)ctx.translate(sx2,sy2);

    // Dark overlay
    ctx.globalAlpha=s.cutAlpha*0.85;ctx.fillStyle="#000";ctx.fillRect(0,0,W,H);

    // Dramatic radial gradient bg
    const bgG=ctx.createRadialGradient(cx,cy,20,cx,cy,W*0.8);
    ctx.globalAlpha=s.cutAlpha*0.4;
    bgG.addColorStop(0,ch.glow+"40");bgG.addColorStop(0.3,ch.dark+"30");bgG.addColorStop(1,"transparent");
    ctx.fillStyle=bgG;ctx.fillRect(0,0,W,H);

    // Energy lines radiating from center
    if(p>0.2&&p<0.7){
      const lineCount=12;
      for(let i=0;i<lineCount;i++){
        const a=Math.PI*2*i/lineCount+t*2;
        const len=80+150*Math.sin(t*8+i*0.5)*((p-0.2)/0.5);
        ctx.globalAlpha=s.cutAlpha*(0.15+0.2*Math.sin(t*6+i));
        ctx.strokeStyle=i%2===0?ch.glow:"#fff";
        ctx.lineWidth=1+Math.sin(t*4+i)*0.5;
        ctx.beginPath();
        ctx.moveTo(cx+Math.cos(a)*40,cy+Math.sin(a)*40);
        ctx.lineTo(cx+Math.cos(a)*len,cy+Math.sin(a)*len);
        ctx.stroke();
      }
    }

    // Expanding ring waves (thicker, with glow)
    ctx.globalAlpha=1;
    s.cutRings.forEach(r=>{
      const w=r.w||2;
      // Outer glow
      ctx.globalAlpha=r.life*0.15;ctx.strokeStyle=r.col;ctx.lineWidth=w+8;
      ctx.beginPath();ctx.arc(cx,cy,r.r,0,Math.PI*2);ctx.stroke();
      // Main ring
      ctx.globalAlpha=r.life*0.6;ctx.lineWidth=w;
      ctx.beginPath();ctx.arc(cx,cy,r.r,0,Math.PI*2);ctx.stroke();
      // Inner bright
      ctx.globalAlpha=r.life*0.3;ctx.strokeStyle="#fff";ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(cx,cy,r.r,0,Math.PI*2);ctx.stroke();
    });

    // Explosion particles
    s.cutParts.forEach(pt=>{
      ctx.globalAlpha=pt.life*0.8;
      // Glow
      ctx.fillStyle=pt.col;
      ctx.beginPath();ctx.arc(pt.x,pt.y,pt.sz+2,0,Math.PI*2);ctx.fill();
      // Core
      ctx.globalAlpha=pt.life;
      ctx.fillStyle="#fff";
      ctx.beginPath();ctx.arc(pt.x,pt.y,pt.sz*0.5,0,Math.PI*2);ctx.fill();
    });

    // Character sprite with dramatic effects
    if(imgReady.current){
      const sz=170*s.cutScale;
      ctx.save();ctx.translate(cx,cy);

      // Rotating outer energy ring
      ctx.save();ctx.rotate(t*3);
      ctx.globalAlpha=s.cutAlpha*0.4;ctx.strokeStyle=ch.glow;ctx.lineWidth=2;
      for(let i=0;i<4;i++){
        ctx.beginPath();ctx.arc(0,0,sz/2+15+i*12,i*Math.PI/2,i*Math.PI/2+Math.PI*0.6);ctx.stroke();
      }
      ctx.restore();

      // Counter-rotating ring
      ctx.save();ctx.rotate(-t*2);
      ctx.globalAlpha=s.cutAlpha*0.25;ctx.strokeStyle="#fff";ctx.lineWidth=1.5;
      for(let i=0;i<3;i++){
        ctx.beginPath();ctx.arc(0,0,sz/2+8+i*18,i*Math.PI*2/3,i*Math.PI*2/3+Math.PI*0.4);ctx.stroke();
      }
      ctx.restore();

      // Pulsing glow behind character
      const glowSz=sz*0.8+Math.sin(t*8)*20;
      const cGlow=ctx.createRadialGradient(0,0,glowSz*0.2,0,0,glowSz);
      cGlow.addColorStop(0,ch.glow+"60");cGlow.addColorStop(0.5,ch.glow+"20");cGlow.addColorStop(1,"transparent");
      ctx.globalAlpha=s.cutAlpha*0.6;ctx.fillStyle=cGlow;
      ctx.beginPath();ctx.arc(0,0,glowSz,0,Math.PI*2);ctx.fill();

      // Character wobble
      ctx.globalAlpha=s.cutAlpha;
      ctx.rotate(Math.sin(t*6)*0.05);
      const sprite=getSprite(c.id,80);
      if(sprite)ctx.drawImage(sprite,-sz/2,-sz/2,sz,sz);
      ctx.restore();

      // Skill name with dramatic entrance
      if(p>0.3){
        const nameAlpha=Math.min(1,(p-0.3)/0.15)*s.cutAlpha;
        const nameY=cy+sz/2+35;
        const nameScale=p<0.45?1.5-(p-0.3)/0.15*0.5:1;

        ctx.save();ctx.translate(W/2,nameY);ctx.scale(nameScale,nameScale);

        // Name glow bg
        ctx.globalAlpha=nameAlpha*0.3;
        ctx.fillStyle=ch.glow;ctx.fillRect(-100,-18,200,36);

        // Skill name text
        ctx.globalAlpha=nameAlpha;
        ctx.textAlign="center";
        ctx.font="bold 32px 'Trebuchet MS',sans-serif";
        // Shadow
        ctx.globalAlpha=nameAlpha*0.5;ctx.fillStyle="#000";ctx.fillText(ch.skillName,2,10);
        // Gradient text
        ctx.globalAlpha=nameAlpha;
        const ng=ctx.createLinearGradient(-80,0,80,0);
        ng.addColorStop(0,"#fff");ng.addColorStop(0.3,ch.glow);ng.addColorStop(0.7,ch.glow);ng.addColorStop(1,"#fff");
        ctx.fillStyle=ng;ctx.fillText(ch.skillName,0,8);

        // Character name
        ctx.fillStyle=ch.glow;ctx.font="bold 14px 'Segoe UI',sans-serif";
        ctx.globalAlpha=nameAlpha*0.7;
        ctx.fillText(ch.name,0,28);
        ctx.restore();
      }
    }

    // White/color flash
    if(s.cutFlash>0){
      ctx.globalAlpha=s.cutFlash*0.6;ctx.fillStyle="#fff";ctx.fillRect(0,0,W,H);
      ctx.globalAlpha=s.cutFlash*0.3;ctx.fillStyle=ch.glow;ctx.fillRect(0,0,W,H);
    }

    ctx.restore();
    ctx.globalAlpha=1;
  };

  const roundRect=(ctx,x,y,w,h,r)=>{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();};

  const inputRef=useRef(null);
  const [showInput,setShowInput]=useState(false);
  const [inputVal,setInputVal]=useState("");
  const [inputCb,setInputCb]=useState(null);

  const askXName=(defaultVal,callback)=>{
    setInputVal(defaultVal||"");
    setInputCb(()=>callback);
    setShowInput(true);
    setTimeout(()=>{if(inputRef.current)inputRef.current.focus();},100);
  };

  const submitXName=()=>{
    const val=inputVal.trim();
    if(inputCb)inputCb(val);
    setShowInput(false);
  };

  return(
    <div style={{width:"100vw",height:"100vh",display:"flex",justifyContent:"center",background:"#070012",overflow:"hidden",touchAction:"none",userSelect:"none",position:"relative"}}>
      <canvas ref={canvasRef} style={{maxWidth:480,width:"100%",height:"100%"}}/>
      {showInput&&(
        <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:10,padding:"20px"}}>
          <div style={{background:"#1a1a2e",borderRadius:16,padding:"28px 24px",width:"90%",maxWidth:400,textAlign:"center",border:"1px solid rgba(150,120,255,0.2)"}}>
            <div style={{fontSize:28,marginBottom:8}}>🎮</div>
            <div style={{color:"#fff",fontSize:18,fontWeight:"bold",marginBottom:6}}>ゲーム終了！</div>
            <div style={{color:"#999",fontSize:13,marginBottom:20}}>ランキングに記載する𝕏アカウント名を入力</div>
            <div style={{position:"relative",marginBottom:20}}>
              <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:"#1DA1F2",fontSize:18,fontWeight:"bold"}}>@</span>
              <input ref={inputRef} value={inputVal} onChange={e=>setInputVal(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter")submitXName();}}
                placeholder="your_x_name"
                style={{width:"100%",padding:"14px 14px 14px 36px",fontSize:18,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(29,161,242,0.3)",borderRadius:10,color:"#fff",outline:"none",fontFamily:"'Segoe UI',sans-serif"}}
              />
            </div>
            <button onClick={submitXName}
              style={{width:"100%",padding:"14px",fontSize:16,fontWeight:"bold",background:"linear-gradient(135deg,#7C4DFF,#1DA1F2)",color:"#fff",border:"none",borderRadius:12,cursor:"pointer",fontFamily:"'Trebuchet MS',sans-serif"}}>
              OK
            </button>
            <div style={{color:"#555",fontSize:11,marginTop:12}}>スキップする場合は空欄でOK</div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(Game));
</script>
